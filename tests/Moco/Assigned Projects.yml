info:
  name: Assigned Projects
  type: graphql
  seq: 15

graphql:
  method: POST
  url: "{{HOST}}/graphql"
  headers:
    - name: Origin
      value: "{{HOST}}"
    - name: x-csrf-token
      value: 0h1nbVYBByzci1UkBSq747XkX-VM1m5s93toz28QW6SWpyx6IdzF8yqe4tTqidkGAHavX3mk6WxdkOkoLQcz7Q
  body:
    query: |-
      query QueryGetProjectsAssigned($id: ID, $term: String, $page: Int) @authorize(any: time_tracking) @noOtp {
        projectsAssigned(
          id: $id
          term: $term
          page: $page
          active: true
          contractActive: true
          tasksActive: true
        ) {
          collection {
            id
            name
            identifier
            isIntern
            isPreferredForTimeTracking
            isBillable
            company {
              id
              name
              __typename
            }
            leader {
              id
              firstname
              name
              fullName
              initials
              color
              avatar {
                id
                thumbUrl
                __typename
              }
              __typename
            }
            __typename
          }
          metadata {
            currentPage
            totalPages
            __typename
          }
          __typename
        }
      }
    variables: |-
      {
        "term": "",
        "page": 1
      }
