    - type: tests
      code: |-
        test('User Exists', () => {
          expect(res.body.id).to.be.a('number');
          bru.setVar('USER_ID', res.body.id);
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
