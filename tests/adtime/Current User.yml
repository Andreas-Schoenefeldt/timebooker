info:
  name: Current User
  type: http
  seq: 1

http:
  method: GET
  url: "{{HOST}}/eew-backend/api/authentication/actinguser"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const data = res.getBody();

        test('has userId', () => {
          const userId = data.userId;
          expect(userId).to.be.a('string');
          
          bru.setVar('ADTIME_USER_ID', userId);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
